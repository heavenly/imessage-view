{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}

<div class="conversation-header-bar">
    <a href="/" class="back-link">&larr;</a>
    <div class="header-avatar{% if is_group %} group{% endif %}">
        {% if is_group %}👥{% else %}{{ contact_name.chars().next().unwrap_or('?') }}{% endif %}
    </div>
    <div class="header-info">
        <h1 class="header-name">{{ contact_name }}</h1>
        {% if is_group %}
        <p class="header-participants">{{ participants.join(", ") }}</p>
        {% endif %}
    </div>
</div>

<div class="tab-bar">
    <button class="tab active" 
            hx-get="/partials/messages?conversation_id={{ conversation_id }}"
            hx-target="#tab-content"
            hx-swap="innerHTML"
            hx-trigger="load, click"
            onclick="document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">
        Messages
    </button>
    <button class="tab"
            hx-get="/partials/conversation-attachments?conversation_id={{ conversation_id }}"
            hx-target="#tab-content"
            hx-swap="innerHTML"
            onclick="document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));this.classList.add('active')">
        Attachments
        <span class="tab-count">({{ attachment_count }})</span>
    </button>
</div>

<div id="tab-content" class="tab-content">
    <p aria-busy="true">Loading...</p>
</div>

{% endblock %}
