{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="im-sidebar">
    <div class="im-sidebar-header">
        <h1>iMessage</h1>
        <input type="search"
               name="filter"
               class="im-search"
               placeholder="Search"
               value="{{ filter }}"
               hx-get="/"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#conversations-list"
               hx-swap="innerHTML"
               hx-push-url="false">
    </div>
    <div id="conversations-list" class="im-conversation-list">
        {% include "partials/conversations.html" %}
    </div>
</div>
<div class="im-main" id="main-content">
    <div class="im-empty-state">
        <p>Select a conversation to view messages</p>
    </div>
</div>
{% endblock %}
