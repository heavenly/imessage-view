{% for r in messages %}
<a href="/conversations/{{ r.conversation_id }}" class="im-search-message-hit"
   hx-get="/partials/conversation-panel?id={{ r.conversation_id }}&amp;focus={{ r.id }}"
   hx-target="#main-content"
   hx-swap="outerHTML"
   hx-push-url="/conversations/{{ r.conversation_id }}">
    <div class="im-search-hit-top">
        <span class="im-search-hit-sender">{{ r.sender_label }}</span>
        <span class="im-search-hit-to">to</span>
        <span class="im-search-hit-conversation">{{ r.conversation_label }}</span>
        <span class="im-search-hit-date">{{ r.date_formatted }}</span>
    </div>
    <p class="im-search-hit-snippet">{{ r.snippet|safe }}</p>
</a>
{% endfor %}
{% if has_more %}
<div class="im-search-load-more" hx-swap-oob="outerHTML:#unified-load-more" id="unified-load-more">
    <button class="im-search-load-more-btn"
            hx-get="/partials/unified-search?q={{ query|urlencode }}&amp;page={{ next_page }}"
            hx-target="#unified-message-results"
            hx-swap="beforeend"
            hx-indicator=".im-search-load-more-btn">
        Load More Messages
    </button>
</div>
{% else %}
<div id="unified-load-more" hx-swap-oob="outerHTML:#unified-load-more" style="display:none;"></div>
{% endif %}
