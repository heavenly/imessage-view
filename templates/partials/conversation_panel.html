<div class="im-main" id="main-content">
<div class="im-conversation-wrapper">
<div class="im-chat-container">
    <header class="im-chat-header">
        <button class="im-chat-header-info{% if !is_group %} im-chat-header-info--solo{% endif %}" onclick="document.getElementById('contact-info-modal').classList.add('active')">
            <div class="im-avatar{% if is_group %} im-avatar--group{% endif %}">
                {% if has_photo %}
                <img src="/conversations/{{ conversation_id }}/photo" alt="" onload="this.classList.add('loaded')">
                {% else %}
                <span class="im-avatar-initial">{% if is_group %}👥{% else %}{{ contact_initial }}{% endif %}</span>
                {% endif %}
            </div>
            <div class="im-chat-header-text">
                <h2 class="im-chat-header-name">{{ contact_name }}</h2>
                {% if is_group %}
                <p class="im-chat-header-participants">{{ participant_summary }}</p>
                <p class="im-chat-header-status" id="conversation-header-status"></p>
                {% else %}
                <p class="im-chat-header-status" id="conversation-header-status"></p>
                {% endif %}
            </div>
        </button>
        <div class="im-chat-header-actions">
            <button class="im-header-btn im-header-btn--toggle-sidebar" title="Toggle Sidebar" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="sidebar-chevron"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
        </div>
    </header>
    
    <div class="im-tab-bar">
        <button class="im-tab active"
                data-tab="messages"
                hx-get="/partials/messages?conversation_id={{ conversation_id }}{% if let Some(fid) = focus_message_id %}&amp;focus={{ fid }}{% endif %}"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                hx-trigger="load, click"
                onclick="activateConversationTab('messages')">
            Messages
        </button>
        <button class="im-tab"
                data-tab="attachments"
                hx-get="/partials/conversation-attachments?conversation_id={{ conversation_id }}"
                hx-target="#tab-content"
                hx-swap="innerHTML"
                onclick="activateConversationTab('attachments')">
            Attachments
            <span class="im-tab-count" id="conversation-attachment-count">{% if let Some(count) = attachment_count %}{{ count }}{% endif %}</span>
        </button>
    </div>
    
    <div id="tab-content" class="im-chat-content">
        <div class="im-loading">
            <span class="im-spinner"></span>
            <p>Loading messages...</p>
        </div>
    </div>
    <button id="scroll-to-bottom" class="im-scroll-bottom" aria-label="Scroll to bottom">&darr;</button>
</div>

<aside id="conversation-sidebar" class="im-conversation-sidebar">
    <div class="im-conversation-sidebar-header">
        <h3>Details</h3>
    </div>
    <div id="conversation-sidebar-content" class="im-sidebar-content">
        <div class="im-loading">
            <span class="im-spinner"></span>
            <p>Loading details...</p>
        </div>
    </div>
</aside>
</div>
</div>

<div id="contact-info-modal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal-content im-contact-modal">
        <button class="modal-close" onclick="document.getElementById('contact-info-modal').classList.remove('active')">&times;</button>
        <div class="im-contact-modal-body">
            <div class="im-avatar im-contact-modal-avatar{% if is_group %} im-avatar--group{% endif %}">
                {% if has_photo %}
                <img src="/conversations/{{ conversation_id }}/photo" alt="" onload="this.classList.add('loaded')">
                {% else %}
                <span class="im-avatar-initial">{% if is_group %}👥{% else %}{{ contact_initial }}{% endif %}</span>
                {% endif %}
            </div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 0.25rem;">
                <h2 class="im-contact-modal-name" style="margin: 0;">{{ contact_name }}</h2>
                {% if !is_group %}
                {% if let Some(contact_id) = primary_contact_id %}
                <a href="/contacts/{{ contact_id }}" title="Open contact insights" aria-label="Open contact insights" style="display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 999px; background: var(--im-bg-tertiary); color: var(--im-text-secondary); text-decoration: none; font-size: 11px; font-weight: 700; line-height: 1;">i</a>
                {% endif %}
                {% endif %}
            </div>
            <div id="contact-info-modal-insights">
                <div class="im-loading">
                    <span class="im-spinner"></span>
                    <p>Loading details...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div hx-get="/partials/conversation-insights?id={{ conversation_id }}"
     hx-trigger="load"
     hx-swap="none"></div>

<div id="media-preview-modal" class="modal-overlay" onclick="closePreview(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closePreview(event)">&times;</button>
        <div id="modal-body"></div>
        <div class="modal-footer">
            <a id="modal-download-btn" href="#" class="btn btn-secondary" download>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 0.5rem;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Download
            </a>
        </div>
    </div>
</div>

<script>
if (typeof window.openPreview === 'undefined') {
    window.openPreview = function(id, type, previewUrl, downloadUrl) {
        const modal = document.getElementById('media-preview-modal');
        const body = document.getElementById('modal-body');
        const downloadBtn = document.getElementById('modal-download-btn');

        if (!modal || !body || !downloadBtn) {
            return;
        }

        body.innerHTML = '';
        downloadBtn.href = downloadUrl || previewUrl;
        downloadBtn.setAttribute('download', '');

        if (type === 'image') {
            const img = document.createElement('img');
            img.src = previewUrl;
            img.style.maxWidth = '100%';
            img.style.maxHeight = '70vh';
            img.style.objectFit = 'contain';
            body.appendChild(img);
        } else if (type === 'video') {
            const video = document.createElement('video');
            video.src = previewUrl;
            video.controls = true;
            video.autoplay = true;
            video.style.maxWidth = '100%';
            video.style.maxHeight = '70vh';
            body.appendChild(video);
        }

        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    };

    window.closePreview = function(event) {
        if (event) event.preventDefault();
        const modal = document.getElementById('media-preview-modal');
        const body = document.getElementById('modal-body');

        if (modal) modal.classList.remove('active');
        if (body) body.innerHTML = '';
        document.body.style.overflow = '';
    };

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape') {
            window.closePreview();
        }
    });
}

window.activateConversationTab = function(tabName) {
    document.querySelectorAll('.im-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.tab === tabName);
    });
};

window.toggleSidebar = function() {
    var sidebar = document.getElementById('conversation-sidebar');
    var chevron = document.querySelector('.sidebar-chevron');
    if (sidebar && chevron) {
        sidebar.classList.toggle('active');
        chevron.classList.toggle('active');
    }
};

(function() {
    var tabContent = document.getElementById('tab-content');
    var scrollBtn = document.getElementById('scroll-to-bottom');

    function setGallerySheet(sheet, image, fallback, tile) {
        if (!sheet || !image || !fallback) {
            return;
        }

        if (!tile) {
            sheet.hidden = true;
            image.removeAttribute('src');
            image.style.display = 'none';
            fallback.style.display = 'none';
            return;
        }

        var tileImage = tile.querySelector('img');
        var src = tileImage ? tileImage.getAttribute('src') : '';
        sheet.hidden = false;
        image.src = src || '';
        image.style.display = '';
        fallback.style.display = 'none';
    }

    function syncGallery(gallery, nextIndex, direction) {
        var tiles = Array.from(gallery.querySelectorAll('[data-gallery-tile]'));
        var mainImage = gallery.querySelector('[data-gallery-image]');
        var fallback = gallery.querySelector('[data-gallery-fallback]');
        var mainButton = gallery.querySelector('[data-gallery-open]');
        var prevButton = gallery.querySelector('[data-gallery-prev]');
        var nextButton = gallery.querySelector('[data-gallery-next]');
        var midSheet = gallery.querySelector('[data-gallery-sheet-mid]');
        var midImage = gallery.querySelector('[data-gallery-mid-image]');
        var midFallback = gallery.querySelector('[data-gallery-mid-fallback]');
        var backSheet = gallery.querySelector('[data-gallery-sheet-back]');
        var backImage = gallery.querySelector('[data-gallery-back-image]');
        var backFallback = gallery.querySelector('[data-gallery-back-fallback]');
        if (!tiles.length || !mainImage || !mainButton) {
            return;
        }

        var currentIndex = Number(gallery.dataset.activeIndex || '0');
        var index = Math.max(0, Math.min(nextIndex, tiles.length - 1));
        var tile = tiles[index];
        var tileImage = tile.querySelector('img');
        var tileId = tile.dataset.id;
        var src = tileImage ? tileImage.getAttribute('src') : '';
        var midTile = tiles[index + 1] || null;
        var backTile = tiles[index + 2] || null;

        if (gallery._galleryAnimationTimer) {
            clearTimeout(gallery._galleryAnimationTimer);
        }

        gallery.classList.remove('is-animating-next', 'is-animating-prev');
        if (direction && index !== currentIndex) {
            gallery.classList.add(direction === 'prev' ? 'is-animating-prev' : 'is-animating-next');
            gallery._galleryAnimationTimer = setTimeout(function() {
                gallery.classList.remove('is-animating-next', 'is-animating-prev');
            }, 260);
        }

        gallery.dataset.activeIndex = String(index);
        mainButton.dataset.galleryId = tileId;
        mainImage.src = src || '';
        mainImage.style.display = '';
        if (fallback) {
            fallback.style.display = 'none';
        }

        tiles.forEach(function(entry, entryIndex) {
            entry.classList.toggle('is-active', entryIndex === index);
        });

        setGallerySheet(midSheet, midImage, midFallback, midTile);
        setGallerySheet(backSheet, backImage, backFallback, backTile);

        if (prevButton) {
            prevButton.disabled = index === 0;
        }
        if (nextButton) {
            nextButton.disabled = index === tiles.length - 1;
        }
    }

    if (tabContent && scrollBtn) {
        if (!document.body.dataset.imMessageFocusBound) {
            document.body.dataset.imMessageFocusBound = '1';
            document.body.addEventListener('htmx:afterSwap', function(event) {
                if (event.target.id !== 'tab-content') {
                    return;
                }

                event.target.querySelectorAll('[data-gallery]').forEach(function(gallery) {
                    syncGallery(gallery, Number(gallery.dataset.activeIndex || '0'));
                });

                var focusedMessage = event.target.querySelector('.im-message--focused');
                if (focusedMessage) {
                    focusedMessage.scrollIntoView({ block: 'center', behavior: 'smooth' });
                }
            });
        }

        tabContent.addEventListener('scroll', function() {
            var distFromBottom = tabContent.scrollHeight - tabContent.scrollTop - tabContent.clientHeight;
            if (distFromBottom > 300) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });
        scrollBtn.addEventListener('click', function() {
            tabContent.scrollTo({ top: tabContent.scrollHeight, behavior: 'smooth' });
        });

        tabContent.addEventListener('click', function(event) {
            var toggle = event.target.closest('[data-gallery-toggle]');
            if (toggle) {
                var toggleGallery = toggle.closest('[data-gallery]');
                if (toggleGallery) {
                    toggleGallery.classList.toggle('im-message-gallery--expanded');
                }
                return;
            }

            var tile = event.target.closest('[data-gallery-tile]');
            if (tile) {
                var tileGallery = tile.closest('[data-gallery]');
                if (tileGallery) {
                    var tileIndex = Number(tile.dataset.index || '0');
                    var currentIndex = Number(tileGallery.dataset.activeIndex || '0');
                    var direction = tileIndex < currentIndex ? 'prev' : tileIndex > currentIndex ? 'next' : null;
                    syncGallery(tileGallery, tileIndex, direction);

                    if (tileGallery.classList.contains('im-message-gallery--expanded')) {
                        var tileAttachmentId = tile.dataset.id;
                        if (tileAttachmentId) {
                            window.openPreview(
                                tileAttachmentId,
                                'image',
                                '/attachments/preview/' + tileAttachmentId,
                                '/attachments/download/' + tileAttachmentId
                            );
                            event.preventDefault();
                        }
                    }
                }
                return;
            }

            var prev = event.target.closest('[data-gallery-prev]');
            if (prev) {
                var prevGallery = prev.closest('[data-gallery]');
                if (prevGallery) {
                    syncGallery(prevGallery, Number(prevGallery.dataset.activeIndex || '0') - 1, 'prev');
                }
                return;
            }

            var next = event.target.closest('[data-gallery-next]');
            if (next) {
                var nextGallery = next.closest('[data-gallery]');
                if (nextGallery) {
                    syncGallery(nextGallery, Number(nextGallery.dataset.activeIndex || '0') + 1, 'next');
                }
                return;
            }

            var open = event.target.closest('[data-gallery-open]');
            if (open) {
                var attachmentId = open.dataset.galleryId;
                if (attachmentId) {
                    window.openPreview(
                        attachmentId,
                        'image',
                        '/attachments/preview/' + attachmentId,
                        '/attachments/download/' + attachmentId
                    );
                    event.preventDefault();
                }
            }
        });

        tabContent.querySelectorAll('[data-gallery]').forEach(function(gallery) {
            syncGallery(gallery, Number(gallery.dataset.activeIndex || '0'));
        });
    }
})();
</script>
