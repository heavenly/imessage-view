{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="im-sidebar">
    <div class="im-sidebar-header">
        <div class="im-header-row">
            <h1>iMessage</h1>
        </div>
        <input type="search"
               name="filter"
               class="im-search"
               placeholder="Search"
               hx-get="/"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#conversations-list"
               hx-swap="innerHTML"
               hx-push-url="false">
    </div>
    <div id="conversations-list" class="im-conversation-list" hx-get="/partials/conversations" hx-trigger="load">
        <p>Loading...</p>
    </div>
</div>

{% include "partials/conversation_panel.html" %}
{% endblock %}
